<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한민국 임시정부 성향 테스트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Gothic+A1:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --warm-brown: #8C6239;
            --deep-brown: #593E1A;
            --light-beige: #F5EBE6;
            --pure-beige: #EADBC8;
            --deep-navy: #1A2F4C;
            --text-dark: #2C2C2C;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Gothic A1', sans-serif;
            background-color: var(--light-beige);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background-color: var(--white);
            width: 100%;
            max-width: 650px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(89, 62, 26, 0.15);
            border: 4px solid var(--warm-brown);
            overflow: hidden;
            padding: 30px;
            position: relative;
        }

        .page {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .page.active { display: flex; opacity: 1; }

        h1, h2, h3 { font-family: 'Noto Serif KR', serif; color: var(--deep-brown); margin-bottom: 20px; }
        h1 { font-size: 1.8rem; font-weight: 700; line-height: 1.4; }
        h2 { font-size: 1.5rem; }
        p { line-height: 1.6; font-size: 1.05rem; margin-bottom: 20px; word-break: keep-all; }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            margin-bottom: 25px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--warm-brown);
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .subtitle {
            font-family: 'Noto Serif KR', serif;
            font-size: 1.05rem;
            color: var(--warm-brown);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .intro-text {
            font-size: 0.98rem;
            color: #555;
            line-height: 1.7;
            margin-bottom: 25px;
            word-break: keep-all;
        }

        .video-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            background-color: #E02828;
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 15px;
            font-family: 'Gothic A1', sans-serif;
            box-shadow: 0 4px 6px rgba(224,40,40,0.2);
            transition: all 0.2s ease;
        }
        .video-btn:hover { background-color: #B01E1E; transform: translateY(-2px); }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 18px 24px;
            background-color: var(--warm-brown);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-family: 'Gothic A1', sans-serif;
            word-break: keep-all;
        }
        .btn:hover { background-color: var(--deep-brown); transform: translateY(-2px); }
        .btn:active { transform: translateY(1px); }

        .progress-container {
            width: 100%;
            background-color: var(--pure-beige);
            height: 12px;
            border-radius: 6px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar { width: 0%; height: 100%; background-color: var(--deep-navy); transition: width 0.3s ease; }

        .question-text {
            font-family: 'Noto Serif KR', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--deep-brown);
            margin-bottom: 35px;
            min-height: 60px;
        }

        .options-group { width: 100%; display: flex; flex-direction: column; gap: 15px; }

        .option-btn {
            background-color: var(--pure-beige);
            color: var(--text-dark);
            border: 2px solid transparent;
            text-align: left;
        }
        .option-btn:hover { background-color: var(--warm-brown); color: var(--white); }

        .mbti-tag {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--deep-navy);
            background-color: var(--pure-beige);
            padding: 4px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        .result-name { font-size: 2.2rem; color: var(--deep-brown); margin-bottom: 5px; }
        .result-title { font-size: 1.15rem; color: var(--warm-brown); font-weight: 700; margin-bottom: 25px; }

        .result-box {
            background-color: #FAF6F0;
            border-left: 5px solid var(--deep-navy);
            padding: 20px;
            text-align: left;
            width: 100%;
            border-radius: 0 8px 8px 0;
            margin-bottom: 25px;
        }
        .result-box h4 { font-weight: 700; color: var(--deep-navy); margin-bottom: 8px; font-size: 1.1rem; }
        .result-box p { margin-bottom: 0; font-size: 1rem; }
        .result-box-section { margin-bottom: 15px; }
        .result-box-section:last-child { margin-bottom: 0; }

        .youtube-btn {
            background-color: #E02828;
            color: var(--white);
            border: 3px solid #B01E1E;
            animation: pulse 2s infinite;
            margin-bottom: 15px;
        }
        .youtube-btn:hover { background-color: #B01E1E; }

        .restart-btn { background-color: var(--deep-navy); }
        .restart-btn:hover { background-color: #112033; }

        @keyframes pulse {
            0%   { transform: scale(1);    box-shadow: 0 4px 6px rgba(224,40,40,0.2); }
            50%  { transform: scale(1.02); box-shadow: 0 4px 15px rgba(224,40,40,0.5); }
            100% { transform: scale(1);    box-shadow: 0 4px 6px rgba(224,40,40,0.2); }
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- 1. 시작 화면 -->
    <div id="start-page" class="page active">
        <h1>역사적 선택으로<br>알아보는 나의 MBTI!</h1>
        <p class="subtitle">🏛️ 궁금해요! 나의 임시정부 MBTI!</p>
        <p class="intro-text">대한민국 임시정부를 만들어가는 과정에서 일어난 역사적 사건들 속에서, 나라면 어떤 선택을 했을까요? 나의 선택을 통해 나와 가장 비슷한 성격의 독립운동가는 누구인지, 그리고 나의 숨겨진 성향을 함께 알아봐요!</p>
        <a href="https://www.youtube.com/watch?v=R9ewuyozYqc" target="_blank" class="video-btn">
            🎬 먼저 임시정부 영상 보고 오기 (클릭!)
        </a>
        <button class="btn" onclick="startTest()">임시정부 요원 활동 시작하기 →</button>
    </div>

    <!-- 2. 질문 화면 -->
    <div id="question-page" class="page">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="question-text" class="question-text">질문이 여기에 등장합니다.</div>
        <div class="options-group">
            <button id="option-A" class="btn option-btn" onclick="selectOption('A')">선택지 A</button>
            <button id="option-B" class="btn option-btn" onclick="selectOption('B')">선택지 B</button>
        </div>
    </div>

    <!-- 3. 결과 화면 -->
    <div id="result-page" class="page">
        <div class="mbti-tag" id="result-mbti">MBTI</div>
        <div class="result-name" id="result-name">독립운동가 이름</div>
        <div class="result-title" id="result-title">부제목</div>
        <div class="result-box">
            <div class="result-box-section">
                <h4>[주요 활동 및 성향]</h4>
                <p id="result-desc">설명</p>
            </div>
            <div class="result-box-section" style="margin-top: 15px;">
                <h4>✨ 나의 성향 이야기</h4>
                <p id="result-impact">영향력</p>
            </div>
        </div>
        <a id="youtube-link" href="#" target="_blank" style="text-decoration: none; width: 100%;">
            <button class="btn youtube-btn">🎬 영상으로 독립운동가 더 알아보기</button>
        </a>
        <button class="btn restart-btn" onclick="restartTest()">다시 테스트하기</button>
    </div>

</div>

<script>
    const questions = [
        { type: 'EI', q: 'Q1. 임시정부의 자금을 모으기 위해 당신은 어떤 임무를 맡겠습니까?', a: '국제회의장에 직접 나가 외교 활동을 펼치며 알린다.', b: '국내 비밀 조직망(연통제)을 조용하고 철저하게 관리한다.' },
        { type: 'EI', q: 'Q2. 새로운 임시정부 비밀 요원을 모집할 때 당신의 방식은?', a: '군중 앞에 당당히 나서서 뜨거운 연설을 하며 모은다.', b: '믿음직한 인물을 직접 조용히 찾아가 1:1로 설득한다.' },
        { type: 'SN', q: 'Q3. 독립운동 자금을 관리할 때 당신이 더 중요하게 생각하는 것은?', a: '안전한 거점을 확보하고 영수증과 장부를 철저히 기록한다.', b: '독립공채를 발행하며 해방 후 돌려줄 미래의 비전을 제시한다.' },
        { type: 'SN', q: 'Q4. 독립을 준비하기 위해 지금 당장 집중해야 할 훈련은?', a: '실전에서 바로 쓸 수 있는 사격술과 강인한 체력 훈련', b: '해방된 이후 새로운 나라가 나아갈 민주주의 제도 구상' },
        { type: 'TF', q: 'Q5. 거사를 앞두고 의열단 동지가 찾아왔을 때 당신의 행동은?', a: '폭탄의 성능과 탈출 경로가 안전한지 냉철하게 체크한다.', b: '두려울 동지의 마음에 깊이 공감하고 따뜻하게 위로한다.' },
        { type: 'TF', q: 'Q6. 임시정부 요원들 사이에 의견 대립이 일어났을 때 해결 방식은?', a: '어느 쪽이 더 이성적인 이득이 있고 현실성 있는지 따져 조율한다.', b: '오해가 생기지 않도록 서로 마음이 다치지 않게 화해시키는 데 집중한다.' },
        { type: 'JP', q: 'Q7. 상해에서 중경으로 임시정부를 급히 이동해야 할 때 당신은?', a: '이동 경로, 교통편, 숙소를 미리 완벽하게 계획해 둔다.', b: '일단 출발한 뒤, 시시각각 변하는 상황을 보며 유연하게 대처한다.' },
        { type: 'JP', q: 'Q8. 일본군 요인을 저격하는 비밀 작전을 연습할 때 당신은?', a: '정해진 시나리오와 동선대로 한 치의 오차도 없이 연습한다.', b: '기본적인 틀만 짜두고, 세부적인 건 현장 분위기와 직감에 맡긴다.' }
    ];

    const ytLinkA = "https://www.youtube.com/watch?v=T7tPr51Jq_o";
    const ytLinkB = "https://www.youtube.com/watch?v=9tmDCmluScM";

    const mbtiResults = {
        "ENFJ": { name: "백범 김구", title: "민족의 큰 스승이자 임시정부의 중심", desc: "가장 힘든 시기에도 대한민국 임시정부를 끝까지 지켜내고, 한인애국단을 조직하여 독립운동의 활로를 열었습니다. 늘 '높은 문화의 힘'을 가진 나라를 꿈꾸었습니다.", impact: "너는 사람들을 따뜻하게 품으면서도 강한 믿음으로 이끄는 리더야! 말 한마디로 사람들의 마음을 움직이고, 함께하면 어떤 어려움도 이겨낼 수 있다고 느끼게 해주지. 미래에는 선생님, 사회복지사, 정치가, NGO 활동가처럼 세상을 더 나은 곳으로 바꾸는 일을 하게 될 거야. 너의 진심 어린 리더십이 많은 사람들에게 희망이 될 수 있어. 꿈을 크게 가져!", link: ytLinkA },
        "ISTP": { name: "매헌 윤봉길", title: "흔들리지 않는 불꽃, 한인애국단의 명사수", desc: "상하이 홍구공원 거사를 치르기 전, 김구 주석과 시계를 바꾸며 담담하게 조국의 독립을 향해 나아갔습니다. 철저한 준비와 과단성으로 세계를 놀라게 했습니다.", impact: "너는 말보다 행동으로 보여주는 진짜 실력파야! 복잡한 상황에서도 침착하게 최선의 방법을 찾아내고, 한번 마음먹으면 끝까지 해내는 뚝심이 있어. 미래에는 항공·우주 엔지니어, 스포츠 선수, 외과 의사, 특수 구조대원처럼 정밀함과 용기가 필요한 분야에서 빛을 발할 거야. 지금 네가 연습하고 훈련하는 모든 것이 언젠가 세상을 구하는 힘이 될 거야!", link: ytLinkA },
        "INFJ": { name: "소앙 조소앙", title: "민족의 미래를 설계한 예언자", desc: "임시정부의 건국강령이 된 '삼균주의(정치·경제·교육의 평등)'를 정립하였습니다. 개인과 개인, 민족과 민족 간의 완전한 평등 국가 청사진을 그렸습니다.", impact: "너는 '왜 이렇게 불평등할까?', '더 공정한 세상은 없을까?' 하고 깊이 생각하는 사람이야. 눈에 보이지 않는 것까지 꿰뚫어 보는 통찰력이 있어서, 미래의 세상이 어떻게 되어야 하는지 그림을 그릴 수 있어. 미래에는 헌법을 만드는 법학자, 복지 정책가, 인권 운동가, 유엔(UN) 활동가처럼 세상의 규칙을 바로잡는 사람이 될 거야. 네가 꿈꾸는 평등한 세상, 반드시 이루어질 거야!", link: ytLinkB },
        "ISFP": { name: "육사 이육사", title: "어둠 속에서 영혼을 울린 저항 시인", desc: "의열단에 가입하여 무장 투쟁에 몸담았을 뿐만 아니라, 감옥 안에서도 '광야', '절정' 등 민족의 기상을 깨우는 아름답고 강인한 저항 시를 집필했습니다.", impact: "너는 아름다움과 용기를 동시에 가진 특별한 사람이야! 조용하지만 네가 만들어내는 그림, 글, 음악 속에는 사람들의 마음을 움직이는 힘이 담겨 있어. 어떤 어려움 속에서도 자신만의 색깔을 잃지 않는 것, 그게 바로 너의 가장 큰 강점이야. 미래에는 작가, 화가, 음악가, 영화감독, 게임 아티스트로서 전 세계 사람들에게 감동을 줄 거야. 네 작품이 누군가의 인생을 바꿀 수도 있어!", link: ytLinkB },

        "ESTJ": { name: "석오 이동녕", title: "임시정부의 든든한 버팀목이자 행정가", desc: "임시정부의 초대 임시의정원 의장을 지내며 법과 제도의 기틀을 마련했습니다. 분열이 일어날 때마다 중심을 잡고 임시정부를 법적으로 수호했습니다.", impact: "너는 규칙과 질서를 소중히 여기고, 맡은 일은 끝까지 책임지는 믿음직한 사람이야! 어떤 상황에서도 흔들리지 않고 팀을 안정시키는 능력이 있어. 미래에는 판사·검사·변호사 같은 법조인, 학교 교장 선생님, 기업의 최고경영자(CEO), 군 지휘관처럼 중요한 책임을 맡는 자리에서 빛날 거야. 네가 세운 원칙이 많은 사람을 지켜줄 거야!", link: ytLinkA },
        "ESFJ": { name: "수우당 최선화", title: "임시정부의 살림을 챙긴 따뜻한 조력자", desc: "한국혁명여성동맹을 결성하고 임시정부 요원들의 생활과 교육을 따뜻하게 보살폈습니다. 독립운동가들이 지치지 않도록 연대와 지원의 중심 역할을 했습니다.", impact: "너는 주변 사람들이 행복한지 항상 먼저 살피는 따뜻한 마음을 가진 사람이야! 네가 있으면 팀 전체가 더 화목하고 힘이 나. 혼자서는 아무리 뛰어나도 이루기 어려운 일도, 사람들을 하나로 연결하는 너 덕분에 가능해져. 미래에는 선생님, 간호사, 사회복지사, 커뮤니티 매니저로서 많은 사람들의 삶을 더 따뜻하게 만드는 사람이 될 거야. 네 배려가 세상을 바꾼단다!", link: ytLinkA },

        "INFJ_HAN": { name: "만해 한용운", title: "침묵을 깨는 민족의 정신적 지주", desc: "임시정부의 정신적 기반이 된 3·1 운동의 민족대표로 활동하며 저항 문학을 꽃피웠습니다. 고난 속에서도 절대 변절하지 않는 굳건한 정신력을 가르쳤습니다.", impact: "너는 조용하지만 마음속에 뜨거운 신념을 품고 있는 사람이야! 남들이 포기할 때도 흔들리지 않는 정신력과, 세상을 더 좋게 만들고 싶다는 깊은 소망이 있어. 미래에는 소설가, 시인, 심리상담사, 종교인, 사회운동가로서 사람들의 마음을 치유하고 올바른 길을 안내하는 정신적 등대가 될 거야. 네가 가진 깊은 생각과 따뜻한 신념이 많은 사람들의 삶에 빛이 되어줄 거야!", link: ytLinkB },

    let currentQuestionIndex = 0;
    let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    function startTest() {
        changePage('start-page', 'question-page');
        showQuestion();
    }

    function showQuestion() {
        const qData = questions[currentQuestionIndex];
        const progressPercent = (currentQuestionIndex / questions.length) * 100;
        document.getElementById('progress-bar').style.width = progressPercent + '%';
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('option-A').innerText = qData.a;
        document.getElementById('option-B').innerText = qData.b;
    }

    function selectOption(choice) {
        const qData = questions[currentQuestionIndex];
        const typeStr = qData.type;
        if (choice === 'A') { scores[typeStr[0]]++; }
        else                { scores[typeStr[1]]++; }

        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            showQuestion();
        } else {
            document.getElementById('progress-bar').style.width = '100%';
            setTimeout(showResult, 300);
        }
    }

    function showResult() {
        let mbti = "";
        mbti += (scores.E >= scores.I) ? "E" : "I";
        mbti += (scores.S >= scores.N) ? "S" : "N";
        mbti += (scores.T >= scores.F) ? "T" : "F";
        mbti += (scores.J >= scores.P) ? "J" : "P";

        // ✅ INFJ 두 인물 분기: I/S/T/J 점수 합으로 구분
        // 두 인물 모두 INFJ 성향 → 추가 지표(N점수 높으면 조소앙, 점수 낮으면 한용운)로 자연 분기
        // 여기서는 N 점수 vs S 점수 차로 구분 (N이 2점이면 조소앙, 1점이면 한용운)
        let lookupKey = mbti;
        if (mbti === "INFJ") {
            lookupKey = (scores.N >= 2) ? "INFJ" : "INFJ_HAN";
        }

        const result = mbtiResults[lookupKey] || mbtiResults["ENFJ"];

        document.getElementById('result-mbti').innerText = mbti;
        document.getElementById('result-name').innerText = result.name;
        document.getElementById('result-title').innerText = result.title;
        document.getElementById('result-desc').innerText = result.desc;
        document.getElementById('result-impact').innerText = result.impact;
        document.getElementById('youtube-link').href = result.link;

        changePage('question-page', 'result-page');
    }

    function restartTest() {
        currentQuestionIndex = 0;
        scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        changePage('result-page', 'start-page');
    }

    // ✅ 수정: 잘려있던 changePage 함수 완성
    function changePage(fromId, toId) {
        const fromPage = document.getElementById(fromId);
        const toPage   = document.getElementById(toId);

        fromPage.style.opacity = 0;
        setTimeout(() => {
            fromPage.classList.remove('active');
            toPage.classList.add('active');
            // 다음 프레임에서 opacity 적용해야 transition이 동작함
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    toPage.style.opacity = 1;
                });
            });
        }, 500);
    }
</script>
